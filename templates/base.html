<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Customer Churn Prediction App — ML Analytics Platform">
    <meta name="author" content="ML Analytics Platform">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">

    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>
        {% block title %}ML Analytics{% endblock %} | Customer Churn Prediction
    </title>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-logo">📊</span>
                <span class="nav-name">ChurnPredict <span class="nav-tag">ML</span></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/predictor" class="nav-link nav-cta {% if request.path == '/predictor' %}active{% endif %}">Predict</a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-text">© 2025 ChurnPredict · Built with Flask &amp; Machine Learning</p>
        </div>
    </footer>

</body>
</html>
