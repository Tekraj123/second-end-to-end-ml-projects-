<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);


            
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #007bff;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Customer Churn Prediction</h2>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen">
                    <option>0</option>
                    <option>1</option>
                </select>
            </div>

            <div class="form-group">
                <label>Partner</label>
                <select name="Partner">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dependents</label>
                <select name="Dependents">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tenure</label>
                <input type="number" name="tenure">
            </div>

            <div class="form-group">
                <label>Phone Service</label>
                <select name="PhoneService">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Multiple Lines</label>
                <select name="MultipleLines">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No phone service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Internet Service</label>
                <select name="InternetService">
                    <option>DSL</option>
                    <option>Fiber optic</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Online Security</label>
                <select name="OnlineSecurity">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Online Backup</label>
                <select name="OnlineBackup">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Device Protection</label>
                <select name="DeviceProtection">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tech Support</label>
                <select name="TechSupport">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Streaming TV</label>
                <select name="StreamingTV">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Streaming Movies</label>
                <select name="StreamingMovies">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Contract</label>
                <select name="Contract">
                    <option>Month-to-month</option>
                    <option>One year</option>
                    <option>Two year</option>
                </select>
            </div>

            <div class="form-group">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <select name="PaymentMethod">
                    <option>Electronic check</option>
                    <option>Mailed check</option>
                    <option>Bank transfer (automatic)</option>
                    <option>Credit card (automatic)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Monthly Charges</label>
                <input type="number" step="0.01" name="MonthlyCharges">
            </div>

            <div class="form-group">
                <label>Total Charges</label>
                <input type="number" step="0.01" name="TotalCharges">
            </div>

            <button type="submit">Predict</button>

        </form>

    </div>

</body>

</html>
